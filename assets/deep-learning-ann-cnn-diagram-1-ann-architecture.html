<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANN Architecture Diagram</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: white;
            font-family: 'Arial', sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 28px;
        }
        svg {
            display: block;
            margin: 0 auto;
        }
        .neuron {
            fill: #3498db;
            stroke: #2980b9;
            stroke-width: 2;
        }
        .connection {
            stroke: #95a5a6;
            stroke-width: 1.5;
            opacity: 0.6;
        }
        .layer-label {
            font-size: 16px;
            font-weight: bold;
            fill: #2c3e50;
        }
        .neuron-label {
            font-size: 12px;
            fill: white;
            text-anchor: middle;
        }
        .formula {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 18px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧠 Artificial Neural Network (ANN) Architecture</h2>
        <svg width="1100" height="600" viewBox="0 0 1100 600">
            <!-- Input Layer -->
            <text x="100" y="50" class="layer-label">Input Layer</text>
            <circle cx="100" cy="150" r="30" class="neuron"/>
            <text x="100" y="155" class="neuron-label">x₁</text>
            
            <circle cx="100" cy="230" r="30" class="neuron"/>
            <text x="100" y="235" class="neuron-label">x₂</text>
            
            <circle cx="100" cy="310" r="30" class="neuron"/>
            <text x="100" y="315" class="neuron-label">x₃</text>
            
            <circle cx="100" cy="390" r="30" class="neuron"/>
            <text x="100" y="395" class="neuron-label">x₄</text>
            
            <circle cx="100" cy="470" r="30" class="neuron"/>
            <text x="100" y="475" class="neuron-label">x₅</text>

            <!-- Hidden Layer 1 -->
            <text x="370" y="50" class="layer-label">Hidden Layer 1</text>
            <circle cx="370" cy="120" r="30" class="neuron"/>
            <text x="370" y="125" class="neuron-label">h₁₁</text>
            
            <circle cx="370" cy="200" r="30" class="neuron"/>
            <text x="370" y="205" class="neuron-label">h₁₂</text>
            
            <circle cx="370" cy="280" r="30" class="neuron"/>
            <text x="370" y="285" class="neuron-label">h₁₃</text>
            
            <circle cx="370" cy="360" r="30" class="neuron"/>
            <text x="370" y="365" class="neuron-label">h₁₄</text>
            
            <circle cx="370" cy="440" r="30" class="neuron"/>
            <text x="370" y="445" class="neuron-label">h₁₅</text>
            
            <circle cx="370" cy="520" r="30" class="neuron"/>
            <text x="370" y="525" class="neuron-label">h₁₆</text>

            <!-- Hidden Layer 2 -->
            <text x="640" y="50" class="layer-label">Hidden Layer 2</text>
            <circle cx="640" cy="180" r="30" class="neuron"/>
            <text x="640" y="185" class="neuron-label">h₂₁</text>
            
            <circle cx="640" cy="270" r="30" class="neuron"/>
            <text x="640" y="275" class="neuron-label">h₂₂</text>
            
            <circle cx="640" cy="360" r="30" class="neuron"/>
            <text x="640" y="365" class="neuron-label">h₂₃</text>
            
            <circle cx="640" cy="450" r="30" class="neuron"/>
            <text x="640" y="455" class="neuron-label">h₂₄</text>

            <!-- Output Layer -->
            <text x="910" y="50" class="layer-label">Output Layer</text>
            <circle cx="910" cy="240" r="30" class="neuron"/>
            <text x="910" y="245" class="neuron-label">ŷ₁</text>
            
            <circle cx="910" cy="340" r="30" class="neuron"/>
            <text x="910" y="345" class="neuron-label">ŷ₂</text>

            <!-- Connections Input to Hidden 1 -->
            <line x1="130" y1="150" x2="340" y2="120" class="connection"/>
            <line x1="130" y1="150" x2="340" y2="200" class="connection"/>
            <line x1="130" y1="150" x2="340" y2="280" class="connection"/>
            <line x1="130" y1="150" x2="340" y2="360" class="connection"/>
            <line x1="130" y1="150" x2="340" y2="440" class="connection"/>
            <line x1="130" y1="150" x2="340" y2="520" class="connection"/>

            <line x1="130" y1="230" x2="340" y2="120" class="connection"/>
            <line x1="130" y1="230" x2="340" y2="200" class="connection"/>
            <line x1="130" y1="230" x2="340" y2="280" class="connection"/>
            <line x1="130" y1="230" x2="340" y2="360" class="connection"/>
            <line x1="130" y1="230" x2="340" y2="440" class="connection"/>
            <line x1="130" y1="230" x2="340" y2="520" class="connection"/>

            <line x1="130" y1="310" x2="340" y2="120" class="connection"/>
            <line x1="130" y1="310" x2="340" y2="200" class="connection"/>
            <line x1="130" y1="310" x2="340" y2="280" class="connection"/>
            <line x1="130" y1="310" x2="340" y2="360" class="connection"/>
            <line x1="130" y1="310" x2="340" y2="440" class="connection"/>
            <line x1="130" y1="310" x2="340" y2="520" class="connection"/>

            <line x1="130" y1="390" x2="340" y2="120" class="connection"/>
            <line x1="130" y1="390" x2="340" y2="200" class="connection"/>
            <line x1="130" y1="390" x2="340" y2="280" class="connection"/>
            <line x1="130" y1="390" x2="340" y2="360" class="connection"/>
            <line x1="130" y1="390" x2="340" y2="440" class="connection"/>
            <line x1="130" y1="390" x2="340" y2="520" class="connection"/>

            <line x1="130" y1="470" x2="340" y2="120" class="connection"/>
            <line x1="130" y1="470" x2="340" y2="200" class="connection"/>
            <line x1="130" y1="470" x2="340" y2="280" class="connection"/>
            <line x1="130" y1="470" x2="340" y2="360" class="connection"/>
            <line x1="130" y1="470" x2="340" y2="440" class="connection"/>
            <line x1="130" y1="470" x2="340" y2="520" class="connection"/>

            <!-- Connections Hidden 1 to Hidden 2 -->
            <line x1="400" y1="120" x2="610" y2="180" class="connection"/>
            <line x1="400" y1="120" x2="610" y2="270" class="connection"/>
            <line x1="400" y1="120" x2="610" y2="360" class="connection"/>
            <line x1="400" y1="120" x2="610" y2="450" class="connection"/>

            <line x1="400" y1="200" x2="610" y2="180" class="connection"/>
            <line x1="400" y1="200" x2="610" y2="270" class="connection"/>
            <line x1="400" y1="200" x2="610" y2="360" class="connection"/>
            <line x1="400" y1="200" x2="610" y2="450" class="connection"/>

            <line x1="400" y1="280" x2="610" y2="180" class="connection"/>
            <line x1="400" y1="280" x2="610" y2="270" class="connection"/>
            <line x1="400" y1="280" x2="610" y2="360" class="connection"/>
            <line x1="400" y1="280" x2="610" y2="450" class="connection"/>

            <line x1="400" y1="360" x2="610" y2="180" class="connection"/>
            <line x1="400" y1="360" x2="610" y2="270" class="connection"/>
            <line x1="400" y1="360" x2="610" y2="360" class="connection"/>
            <line x1="400" y1="360" x2="610" y2="450" class="connection"/>

            <line x1="400" y1="440" x2="610" y2="180" class="connection"/>
            <line x1="400" y1="440" x2="610" y2="270" class="connection"/>
            <line x1="400" y1="440" x2="610" y2="360" class="connection"/>
            <line x1="400" y1="440" x2="610" y2="450" class="connection"/>

            <line x1="400" y1="520" x2="610" y2="180" class="connection"/>
            <line x1="400" y1="520" x2="610" y2="270" class="connection"/>
            <line x1="400" y1="520" x2="610" y2="360" class="connection"/>
            <line x1="400" y1="520" x2="610" y2="450" class="connection"/>

            <!-- Connections Hidden 2 to Output -->
            <line x1="670" y1="180" x2="880" y2="240" class="connection"/>
            <line x1="670" y1="180" x2="880" y2="340" class="connection"/>

            <line x1="670" y1="270" x2="880" y2="240" class="connection"/>
            <line x1="670" y1="270" x2="880" y2="340" class="connection"/>

            <line x1="670" y1="360" x2="880" y2="240" class="connection"/>
            <line x1="670" y1="360" x2="880" y2="340" class="connection"/>

            <line x1="670" y1="450" x2="880" y2="240" class="connection"/>
            <line x1="670" y1="450" x2="880" y2="340" class="connection"/>

            <!-- Annotations -->
            <text x="230" y="320" style="font-size: 14px; fill: #7f8c8d;">w, b</text>
            <text x="500" y="320" style="font-size: 14px; fill: #7f8c8d;">w, b</text>
            <text x="770" y="290" style="font-size: 14px; fill: #7f8c8d;">w, b</text>
        </svg>

        <div class="formula">
            <strong>Neuron Computation:</strong><br>
            z = Σ(wᵢxᵢ) + b → a = σ(z)
        </div>
    </div>
</body>
</html>
